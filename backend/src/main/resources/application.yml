spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/crdt_docs}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:default-dev-key-change-me-in-production}
      expiration: 86400000
      refresh-token:
        expiration: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

two:
  factor:
    auth:
      otp:
        expiration-minutes: 5
